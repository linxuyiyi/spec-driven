templates:
  - id: dss_basic
    name: DSS 基础功能
    type: FUNC
    variables:
      - name: lte_load
        values: [30, 70]
      - name: ue_type
        values: ["商用终端", "模拟器"]
    precondition: |
      1. 基站版本 {{version}}，支持 DSS，频段 {{band}}
      2. LTE 小区已建立，PRB 占用率 {{lte_load}}%
      3. {{ue_type}} 已开机
    steps: |
      1. 配置 DSS 使能，模式=动态，抢占阈值=70%
      2. 重启基站
      3. UE 发起附着请求
    expected_result: |
      - 若 lte_load ≤ 70：UE 成功附着，获得 IP 地址
      - 若 lte_load > 70：UE 附着失败或收到 RRC Release
    postcondition: 释放 UE，关闭 DSS 配置

  - id: dss_negative
    name: DSS 异常场景
    type: NEG
    variables:
      - name: error_type
        values: ["频段不匹配", "阈值超出范围", "DSS 与 CA 冲突"]
    precondition: |
      1. 基站版本 {{version}}，频段 {{band}}
      2. LTE 小区已建立
    steps: |
      1. 配置 DSS，并引入错误：{{error_type}}
      2. 重启基站
      3. 尝试 NR UE 接入
    expected_result: |
      - 基站告警日志显示 DSS 配置失败
      - LTE 小区正常工作
      - NR UE 无法搜索到 DSS 小区
    postcondition: 恢复正确配置
